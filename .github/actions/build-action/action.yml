name: 'Build FMO-OS image'
description: 'Build an FMO-OS image'

inputs:
  BUILD_TARGET:
    description: 'Build target name'
    required: true
  CACHIX_TOKEN:
    description: 'Cachix binary cache token'
    required: true
  RA_TOKEN:
    description: 'RA deployment token'
    required: true
outputs:
  outimg:
    description: 'Resulting output image path in workdir'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.BUILD_TARGET }}
    - ${{ inputs.CACHIX_TOKEN }}
    - ${{ inputs.RA_TOKEN }}
